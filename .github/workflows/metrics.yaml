name: Metrics

  on:
    schedule:
      # UTC 18:00 = Asia/Shanghai 02:00
      - cron: "0 18 * * *"
    workflow_dispatch:
    push:
      branches: [main]
      paths: [.github/workflows/metrics.yml]

  concurrency:
    group: metrics-${{ github.ref }}
    cancel-in-progress: true

  jobs:
    github-metrics:
      runs-on: ubuntu-latest
      timeout-minutes: 15
      permissions:
        contents: write

      env:
        METRICS_USER: vaebe
        METRICS_TZ: Asia/Shanghai
        # 强烈建议换成 PAT (repo + read:org + read:user + read:packages)
        # 否则 followup / achievements / lines 等插件数据不全
        METRICS_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}

      steps:
        - name: Main profile metrics
          uses: lowlighter/metrics@latest
          with:
            token: ${{ env.METRICS_TOKEN }}
            user: ${{ env.METRICS_USER }}
            filename: metrics1.svg
            config_timezone: ${{ env.METRICS_TZ }}
            config_twemoji: yes
            optimize: css, svg
            retries: 3
            retries_delay: 300

            base: header, activity, community, repositories, metadata
            base_indepth: yes

            # Languages
            plugin_languages: yes
            plugin_languages_limit: 8
            plugin_languages_threshold: 2%
            plugin_languages_sections: most-used, recently-used
            plugin_languages_details: percentage, bytes-size
            plugin_languages_categories: programming, markup
            plugin_languages_recent_categories: programming
            plugin_languages_recent_days: 14
            plugin_languages_indepth: yes
            plugin_languages_analysis_timeout: 15

            # Topics & Stars
            plugin_topics: yes
            plugin_topics_limit: 12
            plugin_topics_mode: starred
            plugin_stars: yes
            plugin_stars_limit: 4

            # Lines of code (高价值，但慢)
            plugin_lines: yes
            plugin_lines_history_limit: 1
            plugin_lines_sections: base, repositories

            # Followup metrics (open / closed issue 比例)
            plugin_followup: yes
            plugin_followup_sections: repositories

        - name: Calendar & habits
          uses: lowlighter/metrics@latest
          with:
            token: ${{ env.METRICS_TOKEN }}
            user: ${{ env.METRICS_USER }}
            filename: metrics2.svg
            config_timezone: ${{ env.METRICS_TZ }}
            config_twemoji: yes
            optimize: css, svg
            retries: 3
            retries_delay: 300
            base: ""

            # Iso calendar
            plugin_isocalendar: yes
            plugin_isocalendar_duration: half-year

            # Coding habits（基于近期 commit 推断时间段 / 编辑器偏好）
            plugin_habits: yes
            plugin_habits_from: 200
            plugin_habits_days: 14
            plugin_habits_facts: yes
            plugin_habits_charts: yes

            # Discussions
            plugin_discussions: yes
            plugin_discussions_categories_limit: 8

            # Achievements（成就徽章，profile 装饰性强）
            plugin_achievements: yes
            plugin_achievements_threshold: B
            plugin_achievements_secrets: yes
            plugin_achievements_display: compact
